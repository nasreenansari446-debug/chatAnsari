<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Define the neon glow filter -->
  <defs>
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background matches your --bg-void (#030305) -->
  <rect width="32" height="32" rx="6" fill="#030305"/>
  
  <!-- Sharp Core with Neon Accent Glow (#00f0ff) -->
  <rect x="11" y="11" width="10" height="10" rx="2" fill="#00f0ff" filter="url(#neon-glow)"/>
</svg>
